apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bot-service
  template:
    metadata:
      labels:
        app: bot-service
    spec:
      containers:
      - name: bot-service
        image: ghcr.io/umukino/bot-service:latest
        ports:
        - containerPort: 3007
        env:
        - name: PORT
          value: "3007"
        envFrom:
        - configMapRef:
            name: umukino-config
        - secretRef:
            name: umukino-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: bot-service
spec:
  selector:
    app: bot-service
  ports:
  - port: 3007
    targetPort: 3007
  type: ClusterIP
