apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallet-service
  template:
    metadata:
      labels:
        app: wallet-service
    spec:
      containers:
      - name: wallet-service
        image: ghcr.io/umukino/wallet-service:latest
        ports:
        - containerPort: 3004
        env:
        - name: PORT
          value: "3004"
        envFrom:
        - configMapRef:
            name: umukino-config
        - secretRef:
            name: umukino-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: wallet-service
spec:
  selector:
    app: wallet-service
  ports:
  - port: 3004
    targetPort: 3004
  type: ClusterIP
