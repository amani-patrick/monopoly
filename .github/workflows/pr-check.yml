name: PR Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  changed-services:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth-service: ['apps/auth-service/**', 'packages/**']
            game-service: ['apps/game-service/**', 'packages/**']
            ws-gateway: ['apps/ws-gateway/**', 'packages/**']
            wallet-service: ['apps/wallet-service/**', 'packages/**']
            room-service: ['apps/room-service/**', 'packages/**']
            web: ['apps/web/**']

  build-changed:
    name: Build Check — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changed-services
    if: ${{ needs.changed-services.outputs.services != '[]' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.changed-services.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
